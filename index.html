<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    .player {
      background: #181818;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
      animation: girar 6s linear infinite;
      animation-play-state: paused;
    }

    @keyframes girar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    button {
      background: #1db954;
      border: none;
      color: white;
      padding: 12px 18px;
      margin: 10px;
      font-size: 18px;
      border-radius: 50px;
    }

    .barra {
      width: 100%;
      height: 8px;
      background: #404040;
      border-radius: 10px;
      margin: 15px 0;
      cursor: pointer;
      position: relative;
    }

    .progresso {
      height: 100%;
      background: #1db954;
      width: 0%;
      border-radius: 10px;
    }

    .tempo {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
    }

    input[type=range] {
      width: 100%;
      margin-top: 10px;
    }

    .playlist button {
      width: 100%;
      background: #282828;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="player">

  <h2 id="titulo">Fera Music 🎧</h2>

  <img id="capa" src="capa.JPG">

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

  <button onclick="anterior()">⏮️</button>
  <button onclick="tocar()">▶️</button>
  <button onclick="pausar()">⏸️</button>
  <button onclick="proxima()">⏭️</button>

  <input type="range" min="0" max="1" step="0.01" onchange="audio.volume = this.value">

  <div class="playlist" id="playlist"></div>

  <audio id="audio"></audio>

</div>

<script>
  var musicas = [
    {nome: "Música 1", arquivo: "musica.mp3", capa: "capa.JPG"},
    {nome: "Música 2", arquivo: "musica2.mp3", capa: "capa2.JPG"}
  ];

  var indice = 0;
  var audio = document.getElementById("audio");
  var progresso = document.getElementById("progresso");
  var img = document.getElementById("capa");

  function carregarMusica(i) {
    audio.src = musicas[i].arquivo;
    img.src = musicas[i].capa;
    document.getElementById("titulo").innerText = musicas[i].nome;
    audio.load();
    tocar();
  }

  function tocar() { audio.play(); }
  function pausar() { audio.pause(); }

  function proxima() {
    indice = (indice + 1) % musicas.length;
    carregarMusica(indice);
  }

  function anterior() {
    indice = (indice - 1 + musicas.length) % musicas.length;
    carregarMusica(indice);
  }

  audio.addEventListener("loadedmetadata", function () {
    document.getElementById("duracao").innerText = formatar(audio.duration);
  });

  audio.addEventListener("timeupdate", function () {
    var porcentagem = (audio.currentTime / audio.duration) * 100;
    progresso.style.width = porcentagem + "%";
    document.getElementById("atual").innerText = formatar(audio.currentTime);
  });

  audio.addEventListener("ended", proxima);

  audio.addEventListener("play", () => img.style.animationPlayState = "running");
  audio.addEventListener("pause", () => img.style.animationPlayState = "paused");

  function formatar(segundos) {
    if (isNaN(segundos)) return "0:00";
    var min = Math.floor(segundos / 60);
    var seg = Math.floor(segundos % 60);
    if (seg < 10) seg = "0" + seg;
    return min + ":" + seg;
  }

  function mudarTempo(event) {
    var largura = event.currentTarget.clientWidth;
    var clique = event.offsetX;
    var porcentagem = clique / largura;
    audio.currentTime = porcentagem * audio.duration;
  }

  function montarPlaylist() {
    var lista = document.getElementById("playlist");
    musicas.forEach((m, i) => {
      var btn = document.createElement("button");
      btn.innerText = m.nome;
      btn.onclick = () => {
        indice = i;
        carregarMusica(i);
      };
      lista.appendChild(btn);
    });
  }

  montarPlaylist();
  carregarMusica(indice);
</script>

</body>
</html>
