<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    .player {
      background: #181818;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    button {
      background: #1db954;
      border: none;
      color: white;
      padding: 12px 18px;
      margin: 10px;
      font-size: 18px;
      border-radius: 50px;
    }

    .barra {
      width: 100%;
      height: 8px;
      background: #404040;
      border-radius: 10px;
      margin: 15px 0;
      cursor: pointer;
      position: relative;
    }

    .progresso {
      height: 100%;
      background: #1db954;
      width: 0%;
      border-radius: 10px;
    }

    .tempo {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="player">

  <h2>Fera Music 🎧</h2>

  <img src="capa.JPG">

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

  <button onclick="tocar()">▶️</button>
  <button onclick="pausar()">⏸️</button>

  <audio id="audio" src="musica.mp3"></audio>

</div>

<script>
  var audio = document.getElementById("audio");
  var progresso = document.getElementById("progresso");

  function tocar() {
    audio.play();
  }

  function pausar() {
    audio.pause();
  }

  audio.addEventListener("timeupdate", function () {
    var porcentagem = (audio.currentTime / audio.duration) * 100;
    progresso.style.width = porcentagem + "%";

    document.getElementById("atual").innerText = formatar(audio.currentTime);
    document.getElementById("duracao").innerText = formatar(audio.duration);
  });

  function formatar(segundos) {
    if (isNaN(segundos)) return "0:00";
    var min = Math.floor(segundos / 60);
    var seg = Math.floor(segundos % 60);
    if (seg < 10) seg = "0" + seg;
    return min + ":" + seg;
  }

  function mudarTempo(event) {
    var largura = event.currentTarget.clientWidth;
    var clique = event.offsetX;
    var porcentagem = clique / largura;
    audio.currentTime = porcentagem * audio.duration;
  }
</script>

</body>
</html>
