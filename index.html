<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    .player {
      background: #181818;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    button {
      background: #1db954;
      border: none;
      color: white;
      padding: 15px 20px;
      margin: 10px;
      font-size: 18px;
      border-radius: 15px;
    }

    .barra {
      width: 100%;
      height: 8px;
      background: #404040;
      border-radius: 10px;
      margin: 15px 0;
      cursor: pointer;
    }

    .progresso {
      height: 100%;
      background: #1db954;
      width: 0%;
      border-radius: 10px;
    }

    .tempo {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="player">

  <h2>Fera Music 🎧</h2>

  <img id="capa" src="capa.JPG">

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

  <button onclick="tocar()">▶️</button>
  <button onclick="pausar()">⏸️</button>

  <audio id="audio">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
  const audio = document.getElementById("audio");
  const progresso = document.getElementById("progresso");
  const atual = document.getElementById("atual");
  const duracao = document.getElementById("duracao");

  function tocar() {
    audio.play();
  }

  function pausar() {
    audio.pause();
  }

  audio.addEventListener("loadedmetadata", () => {
    duracao.textContent = formatar(audio.duration);
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      progresso.style.width = pct + "%";
      atual.textContent = formatar(audio.currentTime);
    }
  });

  function mudarTempo(e) {
    const largura = e.currentTarget.clientWidth;
    const clique = e.offsetX;
    const pct = clique / largura;
    audio.currentTime = pct * audio.duration;
  }

  function formatar(s) {
    const m = Math.floor(s / 60);
    let ss = Math.floor(s % 60);
    if (ss < 10) ss = "0" + ss;
    return m + ":" + ss;
  }
</script>

</body>
</html>
