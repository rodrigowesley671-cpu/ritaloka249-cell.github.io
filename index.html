<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fera Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Fundo com blur igual player moderno */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(40px) brightness(0.4);
  z-index: -1;
}

.player {
  background: rgba(24,24,24,0.9);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.9);
}

.titulo {
  color: white;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.musica {
  color: #1db954;
  font-size: 16px;
  margin-bottom: 10px;
}

.player img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.barra {
  background: #555;
  height: 6px;
  border-radius: 10px;
  margin: 15px 0;
  cursor: pointer;
  position: relative;
}

.progresso {
  background: #1db954;
  height: 6px;
  border-radius: 10px;
  width: 0%;
}

.tempo {
  display: flex;
  justify-content: space-between;
  color: #ccc;
  font-size: 12px;
}

.controles {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.controles button {
  background: #2a2a2a;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  cursor: pointer;
}

.play {
  background: #1db954;
  width: 65px;
  height: 65px;
  font-size: 22px;
}

.controles button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div id="bg"></div>

<div class="player">
  <div class="titulo">Fera Music 🎧</div>
  <div class="musica" id="nome">Nome da Música</div>

  <img id="capa" src="capa.jpg">

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

  <div class="controles">
    <button onclick="anterior()">⏮</button>
    <button class="play" onclick="tocar()">▶</button>
    <button onclick="pausar()">⏸</button>
    <button onclick="proxima()">⏭</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");
const progresso = document.getElementById("progresso");
const atual = document.getElementById("atual");
const duracao = document.getElementById("duracao");
const capa = document.getElementById("capa");
const bg = document.getElementById("bg");
const nome = document.getElementById("nome");

const musicas = [
  {
    nome: "Famoso JMA",
    arquivo: "musica.mp3",
    capa: "capa.jpg"
  },
  {
    nome: "Outra Música",
    arquivo: "musica2.mp3",
    capa: "capa2.jpg"
  }
];

let indice = 0;

function carregarMusica() {
  const m = musicas[indice];
  audio.src = m.arquivo;
  capa.src = m.capa;
  bg.style.backgroundImage = `url(${m.capa})`;
  nome.textContent = m.nome;
  audio.load();
}

function tocar() {
  audio.play();
}

function pausar() {
  audio.pause();
}

function proxima() {
  indice = (indice + 1) % musicas.length;
  carregarMusica();
  audio.play();
}

function anterior() {
  indice = (indice - 1 + musicas.length) % musicas.length;
  carregarMusica();
  audio.play();
}

audio.addEventListener("loadedmetadata", () => {
  duracao.textContent = formatar(audio.duration);
});

audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progresso.style.width = pct + "%";
    atual.textContent = formatar(audio.currentTime);
  }
});

function mudarTempo(e) {
  const largura = e.currentTarget.clientWidth;
  const clique = e.offsetX;
  const pct = clique / largura;
  audio.currentTime = pct * audio.duration;
}

function formatar(s) {
  const m = Math.floor(s / 60);
  let ss = Math.floor(s % 60);
  if (ss < 10) ss = "0" + ss;
  return m + ":" + ss;
}

carregarMusica();
</script>

</body>
</html>
