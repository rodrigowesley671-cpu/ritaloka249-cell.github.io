<!DOCTYPE html>
<html>
<head>
<title>Fera Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
button{
background:#1db954;
color:white;
border:none;
padding:15px 25px;

}
</style>

<body>

<h1>🐯 Fera Music</h1>
<p>Seu aplicativo de música ilimitada</p>

<button onclick="tocarMusica()">Tocar música</button>

<audio id="player" src="musica.mp3"></audio>
<script>
function tocarMusica() {
    var player = document.getElementById("player");
    player.play();
}
</script>
