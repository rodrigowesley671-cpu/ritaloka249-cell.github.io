<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    img {
      width: 250px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

  <h1>Fera Music 🎧</h1>

  <!-- CAPA -->
  <img src="capa.jpg" alt="Capa da música">

  <br>

  <!-- BOTÕES -->
  <button onclick="tocar()">▶️ Tocar</button>
  <button onclick="pausar()">⏸️ Pausar</button>

  <!-- AUDIO -->
  <audio id="audio" src="musica.mp3"></audio>

  <script>
    var musica = document.getElementById("audio");

    function tocar() {
      musica.play();
    }

    function pausar() {
      musica.pause();
    }
  </script>

</body>
</html>
