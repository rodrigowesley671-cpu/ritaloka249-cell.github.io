<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      background: #1db954;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1 id="titulo">Clique para tocar música</h1>

  <button onclick="tocarMusica()" id="botao">Tocar música</button>

  <audio id="audio" src="musica.mp3"></audio>

  <script>
    function tocarMusica() {
      var musica = document.getElementById("audio");
      musica.play();

      document.getElementById("botao").style.display = "none";
      document.getElementById("titulo").innerText = "Agora está tocando 🎧";
    }
  </script>

</body>
</html>
