<!DOCTYPE html>
<html>
<head>
  <title>Fera Music</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  background: #0b0b0b;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.player {
  background: #181818;
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  text-align: center;
}

.player img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
}

.titulo {
  color: white;
  font-size: 20px;
  margin-bottom: 10px;
}

.barra {
  background: #404040;
  height: 6px;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px 0;
  position: relative;
}

.progresso {
  background: #1db954;
  height: 6px;
  border-radius: 10px;
  width: 0%;
}

.tempo {
  display: flex;
  justify-content: space-between;
  color: #b3b3b3;
  font-size: 12px;
}

.controles {
  margin-top: 15px;
}

.controles button {
  background: #1db954;
  border: none;
  color: white;
  font-size: 18px;
  margin: 5px;
  padding: 12px 16px;
  border-radius: 50%;
  cursor: pointer;
}
  </style>
</head>

<body>

<div class="player">

  <h2>Fera Music 🎧</h2>

  <img id="capa" src="capa.JPG">

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

<button onclick="anterior()">⏮️</button>
<button onclick="tocar()">▶️</button>
<button onclick="pausar()">⏸️</button>
<button onclick="proxima()">⏭️</button>
  <audio id="audio">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
  const audio = document.getElementById("audio");

const musicas = [
  {arquivo: "musica.mp3", capa: "capa.JPG"},
  {arquivo: "musica2.mp3", capa: "capa2.JPG"}
];

let indice = 0;
  const progresso = document.getElementById("progresso");
  const atual = document.getElementById("atual");
  const duracao = document.getElementById("duracao");

  function tocar() {
    audio.play();
  }

  function pausar() {
    audio.pause();
  }
function carregarMusica() {
  audio.src = musicas[indice].arquivo;
  document.getElementById("capa").src = musicas[indice].capa;
  audio.load();
}

function proxima() {
  indice = (indice + 1) % musicas.length;
  carregarMusica();
  audio.play();
}

function anterior() {
  indice = (indice - 1 + musicas.length) % musicas.length;
  carregarMusica();
  audio.play();
}
  audio.addEventListener("loadedmetadata", () => {
    duracao.textContent = formatar(audio.duration);
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
      const pct = (audio.currentTime / audio.duration) * 100;
      progresso.style.width = pct + "%";
      atual.textContent = formatar(audio.currentTime);
    }
  });

  function mudarTempo(e) {
    const largura = e.currentTarget.clientWidth;
    const clique = e.offsetX;
    const pct = clique / largura;
    audio.currentTime = pct * audio.duration;
  }

  function formatar(s) {
    const m = Math.floor(s / 60);
    let ss = Math.floor(s % 60);
    if (ss < 10) ss = "0" + ss;
    return m + ":" + ss;
  }
  carregarMusica();
</script>

</body>
</html>
