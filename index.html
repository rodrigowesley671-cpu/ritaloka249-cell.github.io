<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fera Music</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(20px) brightness(40%);
      transform: scale(1.2);
    }

    .player {
      position: relative;
      z-index: 2;
      padding: 30px;
      text-align: center;
    }

    .capa {
      width: 80%;
      max-width: 300px;
      border-radius: 15px;
      margin-top: 60px;
    }

    .titulo {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .artista {
      color: #ccc;
      margin-bottom: 20px;
    }

    .barra {
      width: 90%;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      margin: 20px auto;
      cursor: pointer;
      position: relative;
    }

    .progresso {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 10px;
    }

    .tempo {
      width: 90%;
      margin: auto;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #ccc;
    }

    .controles {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .btn {
      background: none;
      border: none;
      color: white;
      font-size: 30px;
    }

    .play {
      background: white;
      color: black;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 30px;
    }
  </style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="player">

  <img id="capa" class="capa" src="capa.JPG">

  <div class="titulo" id="titulo">Nome da Música</div>
  <div class="artista" id="artista">Artista</div>

  <div class="barra" onclick="mudarTempo(event)">
    <div class="progresso" id="progresso"></div>
  </div>

  <div class="tempo">
    <span id="atual">0:00</span>
    <span id="duracao">0:00</span>
  </div>

  <div class="controles">
    <button class="btn" onclick="anterior()">⏮</button>
    <button class="btn play" onclick="toggle()">▶</button>
    <button class="btn" onclick="proxima()">⏭</button>
  </div>

  <audio id="audio"></audio>

</div>

<script>
  var musicas = [
    {
      nome: "Tropa do Mais Novo",
      artista: "DJ Biel, Vulgo FK",
      arquivo: "musica.mp3",
      capa: "capa.JPG"
    }
  ];

  var indice = 0;
  var audio = document.getElementById("audio");

  function carregar(i) {
    var m = musicas[i];
    audio.src = m.arquivo;
    document.getElementById("capa").src = m.capa;
    document.getElementById("bg").style.backgroundImage = "url(" + m.capa + ")";
    document.getElementById("titulo").innerText = m.nome;
    document.getElementById("artista").innerText = m.artista;
    audio.load();
  }

  function toggle() {
    if (audio.paused) audio.play();
    else audio.pause();
  }

  function proxima() {
    indice = (indice + 1) % musicas.length;
    carregar(indice);
    audio.play();
  }

  function anterior() {
    indice = (indice - 1 + musicas.length) % musicas.length;
    carregar(indice);
    audio.play();
  }

  audio.addEventListener("timeupdate", function () {
    var p = (audio.currentTime / audio.duration) * 100;
    document.getElementById("progresso").style.width = p + "%";
    document.getElementById("atual").innerText = formatar(audio.currentTime);
  });

  audio.addEventListener("loadedmetadata", function () {
    document.getElementById("duracao").innerText = formatar(audio.duration);
  });

  function mudarTempo(e) {
    var barra = e.currentTarget;
    var x = e.offsetX;
    var pct = x / barra.clientWidth;
    audio.currentTime = pct * audio.duration;
  }

  function formatar(s) {
    var m = Math.floor(s / 60);
    var ss = Math.floor(s % 60);
    if (ss < 10) ss = "0" + ss;
    return m + ":" + ss;
  }

  carregar(0);
</script>

</body>
</html>
